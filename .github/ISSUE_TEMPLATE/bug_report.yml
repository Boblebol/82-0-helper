name: Bug report
description: Report a reproducible problem in the extension.
title: "bug: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please include enough detail to reproduce it.
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: List the exact steps, including game mode, team, decade, and round when relevant.
      placeholder: |
        1. Open 82-0.com
        2. Start Classic mode
        3. Roll ...
    validations:
      required: true
  - type: input
    id: browser
    attributes:
      label: Browser
      placeholder: Chrome 126, Edge 126, Brave 1.67, etc.
    validations:
      required: true
  - type: input
    id: extension-version
    attributes:
      label: Extension version
      placeholder: v0.1.1
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Extra context
      description: Screenshots, console errors, or notes that help explain the issue.
